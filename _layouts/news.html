---
layout: default
---

<section class="news-page">
    <header class="news-header">
        <p class="news-header__eyebrow">Project updates</p>
        <h1>{{ page.title }}</h1>
        <div class="news-header__intro">
            {{ content }}
        </div>
    </header>


    <br/>


    <div class="news-feed">
        {% for post in site.posts %}
        {% if post.categories contains "news" %}
        {% include news-card.html post=post %}
        {% elsif post.categories contains "release" %}
        {% include news-card.html post=post %}
        {% endif %}
        {% endfor %}
    </div>
</section>
